$kind: http-request
name: Login
method: POST
url: 'http://localhost:5000/api/users/login'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "emailOrUsername": "{{email}}",
      "password": "{{password}}"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const json = pm.response.json();
      if (json.token) {
          pm.collectionVariables.set("authToken", json.token);
          console.log("Token saved:", json.token);
      }
