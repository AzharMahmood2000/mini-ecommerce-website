<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sales - Admin</title>
  <link rel="stylesheet" href="../css/adminpanel-style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="dashboard-container">
    <aside class="sidebar">
      <div class="sidebar-header"><h3>Admin Panel</h3><p>MANAGEMENT SUITE</p></div>
      <nav class="sidebar-nav">
        <ul>
          <li><a href="adminpanel.html"><i class="fa-solid fa-table-columns"></i> Dashboard</a></li>
          <li><a href="inventory.html"><i class="fa-solid fa-box-archive"></i> Inventory</a></li>
          <li><a href="sales.html"><i class="fa-solid fa-chart-line"></i> Sales</a></li>
          <li><a href="customers.html"><i class="fa-solid fa-users"></i> Customers</a></li>
          <li><a href="analytics.html"><i class="fa-solid fa-chart-pie"></i> Analytics</a></li>
          <li><a href="orders.html"><i class="fa-solid fa-file-lines"></i> Orders</a></li>
        </ul>
      </nav>
    </aside>
    <main class="main-content">
      <header class="admin-header"><div class="header-left"><h2>Ms Electronics Hub</h2></div></header>
      <section class="card">
        <div class="card-header"><h3>Sales Overview</h3><p>Monitor sales performance</p></div>
        <div class="card-body">
          <div class="stats-row">
            <div class="stat-card"><div class="stat-main"><p>Total Sales</p><h2 id="totalSales">Rs 0</h2></div></div>
            <div class="stat-card"><div class="stat-main"><p>Daily</p><h3 id="dailySales">Rs 0</h3></div></div>
            <div class="stat-card"><div class="stat-main"><p>Monthly</p><h3 id="monthlySales">Rs 0</h3></div></div>
          </div>

          <div class="chart-container card">
            <div class="card-header"><h3>Revenue (last 30 days)</h3></div>
            <canvas id="revenueChart" height="120"></canvas>
          </div>

          <div class="card">
            <div class="card-header"><h3>Recent Transactions</h3></div>
            <div class="table-responsive"><table id="transactionsTable"><thead><tr><th>Order ID</th><th>Date</th><th>Amount</th><th>Payment</th></tr></thead><tbody></tbody></table></div>
          </div>
        </div>
      </section>
    </main>
  </div>
  <script src="../js/sidebar-nav.js"></script>
  <script src="../js/sales.js"></script>
</body>
</html>
